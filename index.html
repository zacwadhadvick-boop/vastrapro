<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#b4914a" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3145/3145827.png" />
    <title>VastraBill Enterprise</title>
    <style>
      /* Disable text selection globally */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      /* Re-enable selection for inputs and textareas so users can still type */
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
    </style>
  </head>
  <body oncontextmenu="return false;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent standard DevTools shortcuts and secondary extraction methods
      document.addEventListener('keydown', function(e) {
        if (
          e.keyCode === 123 || // F12
          (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
          (e.ctrlKey && e.keyCode === 85) || // Ctrl+U (View Source)
          (e.ctrlKey && e.keyCode === 83) || // Ctrl+S (Save Page)
          (e.ctrlKey && e.keyCode === 80)    // Ctrl+P (Print - optional but often used for extraction)
        ) {
          e.preventDefault();
          return false;
        }
      });

      // Periodic console clear to discourage inspection
      setInterval(() => {
        console.clear();
      }, 1000);

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
